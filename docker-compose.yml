# Future: once a domain is available, an Nginx service will front both of
# these on 80/443 and route by path — e.g. domain.com -> frontend,
# domain.com/api -> backend — so browsers only ever talk to one origin.
# Not implemented yet; frontend/backend are still reached directly by port.

services:
  backend:
    build: ./fiddlers_green-backend
    container_name: fiddlers-backend
    ports:
      - "8000:8000"
    env_file:
      - ./fiddlers_green-backend/.env
    healthcheck:
      # python:3.11-slim has no curl installed; urllib is stdlib, so this
      # avoids adding a package just for the healthcheck.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./fiddlers_green-frontend
      args:
        # Left empty on purpose — see fiddlers_green-frontend/Dockerfile for
        # why. lib/api.ts falls back to the browser's own host at runtime,
        # so this image works unmodified once Nginx/a real domain is added.
        NEXT_PUBLIC_BACKEND_URL: ""
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
    container_name: fiddlers-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./fiddlers_green-frontend/.env.local
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r => { if (!r.ok) process.exit(1) })"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy
